# theme = "doom-one"
# theme = "omarchy"
# theme = "varua"
theme = "noctalia"
[editor]
auto-save = true
auto-format = true
bufferline = "multiple"
color-modes = true
completion-replace = true
cursorcolumn = true
cursorline = true
line-number = "relative"
mouse = false
rulers = [79, 100]
true-color = true

[editor.whitespace.render]
space = "none"
nbsp = "none"
tab = "none"
newline = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
tab = "→"
newline = "⏎"
tabpad = "·"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.statusline]
left = [
  "mode",
  "spacer",
  "version-control",
  "spacer",
  "separator",
  "file-name",
  "file-modification-indicator"
]
right = [
  "spinner",
  "spacer",
  "workspace-diagnostics",
  "separator",
  "spacer",
  "diagnostics",
  "position",
  "file-encoding",
  "file-line-ending",
  "file-type"
]
separator = "╎"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-messages = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 0

[editor.soft-wrap]
enable = true
max-wrap = 10
max-indent-retain = 40

# ===== KEYBINDINGS =====
[keys.normal]
# Capslock -> Esc (local config)
esc = ["collapse_selection", "keep_primary_selection", ":w"]

# ==== WINDOW NAVIGATION (PRIMARY: Alt) ====
A-h = "jump_view_left"
A-j = "jump_view_down"
A-k = "jump_view_up"
A-l = "jump_view_right"
# Window splitting
A-v = "vsplit"
A-s = "hsplit"
A-c = ":bc"      # Close current buffer

# ==== LINE MOVEMENT ====
# Using Shift+Alt instead to avoid conflicts
"A-S-j" = [
  "extend_to_line_bounds",
  "delete_selection",
  "move_line_down",
  "paste_before"
]
"A-S-k" = [
  "extend_to_line_bounds",
  "delete_selection",
  "move_line_up",
  "paste_before"
]

# ==== BUFFER NAVIGATION ====
A-n = "goto_next_buffer"           # Next buffer
A-p = "goto_previous_buffer"       # Previous buffer
A-b = "buffer_picker"              # Show all buffers (picker)
"A-S-c" = ":bca"                   # Close all buffers
"A-S-d" = ":bco"                   # Close other buffers (keep current)

# ==== QUICK ACTIONS ====
A-w = ":w"        # Save
A-q = ":quit"     # Quit
A-Q = ":quit!"    # Force quit
K = "insert_newline"

# ==== SEARCH & REPLACE ====
A-f = "file_picker"
A-g = "global_search"

# ==== FALLBACK Ctrl BINDINGS (if Alt stops working) ====
C-h = "jump_view_left"
C-j = "jump_view_down"
C-n = "jump_view_up"
C-m = "jump_view_right"
C-v = "vsplit"
C-s = "hsplit"

A-S-F = ":format"
# ==== VIM-LIKE SUBCOMMANDS ====
[keys.normal.g]
q = ":bc"
Q = ":bc!"

# ==== INSERT MODE ====
[keys.insert]
# jk escape
j = { k = "normal_mode" }

# Disable arrow keys
# up = "no_op"
# down = "no_op"
# left = "no_op"
# right = "no_op"
# pageup = "no_op"
# pagedown = "no_op"
# home = "no_op"
# end = "no_op"

# Completion
"C-space" = "completion"

# ==== CONFIG MANAGEMENT ====
[keys.normal."A-backspace"]
r = [":config-reload", ":reload-all"]
o = ":config-open"
l = ":o ~/.config/helix/languages.toml"
