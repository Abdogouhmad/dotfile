## Required binaries:
##   rust-analyzer, clippy (rustup component), dart, clangd, clang-format
##   typescript-language-server, prettier, tailwindcss-language-server
##   vscode-css-language-server, vscode-html-language-server (npm i -g vscode-langservers-extracted)
##   pyright, ruff, bash-language-server, shfmt, taplo, yaml-language-server

## RUST
[[language]]
name = "rust"
auto-format = true
scope = "source.rust"
injection-regex = "rust"
file-types = ["rs"]
roots = ["Cargo.toml", "Cargo.lock"]
language-servers = ["rust-analyzer"]
persistent-diagnostic-sources = ["rustc", "clippy"]
indent = { tab-width = 4, unit = "    " }
block-comment-tokens = [
  { start = "/*", end = "*/" },
  { start = "/**", end = "*/" },
  { start = "/*!", end = "*/" },
]

[language-server.rust-analyzer]
command = "rust-analyzer"

[language-server.rust-analyzer.config.check]
command = "clippy"

[language-server.rust-analyzer.config.inlayHints]
bindingModeHints.enable = false
closingBraceHints.minLines = 10
closureReturnTypeHints.enable = "with_block"
discriminantHints.enable = "fieldless"
lifetimeElisionHints.enable = "skip_trivial"
typeHints.hideClosureInitialization = false

## DART / FLUTTER
[[language]]
name = "dart"
auto-format = true
language-servers = ["dart"]
formatter = { command = "dart", args = ["format"] }
indent = { tab-width = 2, unit = "  " }

[language-server.dart]
command = "dart"
args = ["language-server", "--protocol=lsp"]

[language-server.dart.config]
enableSdkFormatter = true
lineLength = 80
completeFunctionCalls = true

## JAVASCRIPT
[[language]]
name = "javascript"
auto-format = true
language-servers = ["typescript-language-server", "tailwindcss-ls"]
formatter = { command = "prettier", args = ["--parser", "babel"] }
indent = { tab-width = 2, unit = "  " }

## JSX
[[language]]
name = "jsx"
auto-format = true
language-servers = ["typescript-language-server", "tailwindcss-ls"]
formatter = { command = "prettier", args = ["--parser", "babel"] }
indent = { tab-width = 2, unit = "  " }

## TYPESCRIPT
[[language]]
name = "typescript"
auto-format = true
language-servers = ["typescript-language-server", "tailwindcss-ls"]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
indent = { tab-width = 2, unit = "  " }

## TSX
[[language]]
name = "tsx"
auto-format = true
language-servers = ["typescript-language-server", "tailwindcss-ls"]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
indent = { tab-width = 2, unit = "  " }

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]
config.hostInfo = "helix"

[language-server.typescript-language-server.config.typescript.inlayHints]
includeInlayEnumMemberValueHints = true
includeInlayFunctionLikeReturnTypeHints = true
includeInlayFunctionParameterTypeHints = true
includeInlayParameterNameHints = "all"
includeInlayParameterNameHintsWhenArgumentMatchesName = true
includeInlayPropertyDeclarationTypeHints = true
includeInlayVariableTypeHints = true

[language-server.typescript-language-server.config.javascript.inlayHints]
includeInlayEnumMemberValueHints = true
includeInlayFunctionLikeReturnTypeHints = true
includeInlayFunctionParameterTypeHints = true
includeInlayParameterNameHints = "all"
includeInlayParameterNameHintsWhenArgumentMatchesName = true
includeInlayPropertyDeclarationTypeHints = true
includeInlayVariableTypeHints = true

